<!DOCTYPE html>
<html lang="th" data-t="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Food Testing Record</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f5f7; --card:#ffffff; --line:#e4e7ec; --text:#1a1d21; --sub:#6b7280;
  --accent:#e8590c; --accent-soft:#fff1e8; --green:#16a34a; --amber:#d97706; --red:#dc2626;
  --shadow:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);
  --shadow-lg:0 10px 30px rgba(16,24,40,.12);
}
[data-t="dark"]{
  --bg:#0f1115; --card:#1a1d23; --line:#2a2e37; --text:#eceef2; --sub:#9aa3af;
  --accent:#ff7a33; --accent-soft:#2a1c12; --green:#22c55e; --amber:#f59e0b; --red:#f04438;
  --shadow:0 1px 3px rgba(0,0,0,.4); --shadow-lg:0 14px 40px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Prompt',system-ui,sans-serif;background:var(--bg);color:var(--text);
  font-weight:400;line-height:1.5;transition:background .25s,color .25s;padding-bottom:40px}
h1,h2,h3{font-weight:600;line-height:1.25}
input,select,textarea,button{font-family:inherit;font-size:15px;color:var(--text)}
.wrap{max-width:840px;margin:0 auto;padding:0 14px}

/* Top bar */
.topbar{position:sticky;top:0;z-index:50;background:color-mix(in srgb,var(--bg) 80%,transparent);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.topbar .row{display:flex;align-items:center;gap:10px;height:56px}
.brand{font-weight:700;font-size:17px;display:flex;align-items:center;gap:8px;flex:1}
.brand .dot{width:30px;height:30px;border-radius:9px;background:var(--accent-soft);
  display:grid;place-items:center;font-size:17px}
.iconbtn{width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:var(--card);
  cursor:pointer;font-size:16px;display:grid;place-items:center;transition:transform .12s,background .2s}
.iconbtn:active{transform:scale(.92)}

/* Tabs */
.tabs{display:flex;gap:6px;overflow-x:auto;padding:10px 0 2px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;border:1px solid var(--line);background:var(--card);border-radius:50px;
  padding:9px 16px;font-weight:500;font-size:14px;cursor:pointer;white-space:nowrap;transition:.15s}
.tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.tab:active{transform:scale(.96)}

/* Cards & layout */
.view{display:none;padding-top:16px}
.view.active{display:block;animation:fade .25s}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:16px;box-shadow:var(--shadow);margin-bottom:14px}
.card h3{font-size:15px;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card h3 .pip{width:4px;height:16px;border-radius:3px;background:var(--accent)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:560px){.grid2{grid-template-columns:1fr}}
label.fl{display:block;font-size:12.5px;color:var(--sub);margin:0 0 5px 2px;font-weight:500}
.inp{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;background:var(--bg);
  transition:border-color .15s}
.inp:focus{outline:none;border-color:var(--accent)}
textarea.inp{resize:vertical;min-height:70px}

/* photo */
.photos{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ph{border:1.5px dashed var(--line);border-radius:12px;aspect-ratio:4/3;display:grid;place-items:center;
  cursor:pointer;overflow:hidden;position:relative;background:var(--bg);text-align:center}
.ph img{width:100%;height:100%;object-fit:cover}
.ph .plh{color:var(--sub);font-size:13px;padding:10px}
.ph .clr{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);color:#fff;border:none;
  width:26px;height:26px;border-radius:50%;cursor:pointer;display:none}
.ph.has .clr{display:block}

/* criteria rows */
.grp-title{font-size:12px;font-weight:600;color:var(--accent);text-transform:uppercase;
  letter-spacing:.04em;margin:16px 2px 8px}
.crit{padding:11px 0;border-bottom:1px solid var(--line)}
.crit:last-child{border-bottom:none}
.crit .nm{font-weight:500;font-size:14.5px}
.crit .ds{font-size:12px;color:var(--sub);margin-top:2px}
.score{display:flex;gap:5px;margin-top:9px;flex-wrap:wrap}
.sc{width:38px;height:38px;border-radius:9px;border:1.5px solid var(--line);background:var(--bg);
  font-weight:600;cursor:pointer;transition:.12s}
.sc:active{transform:scale(.9)}
.sc.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.sc.on.lo{background:var(--red);border-color:var(--red)}
.sc.on.mid{background:var(--amber);border-color:var(--amber)}

/* total bar */
.totbar{position:sticky;bottom:0;z-index:40;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:12px 16px;box-shadow:var(--shadow-lg);display:flex;align-items:center;
  gap:12px;margin-top:6px}
.totbar .big{font-size:24px;font-weight:700}
.totbar .pct{font-size:13px;color:var(--sub)}
.badge{padding:4px 10px;border-radius:50px;font-size:12px;font-weight:600;color:#fff}
.btn{border:none;border-radius:50px;padding:11px 22px;font-weight:600;font-size:15px;cursor:pointer;
  background:var(--accent);color:#fff;transition:transform .12s,opacity .2s}
.btn:active{transform:scale(.95)}
.btn.ghost{background:var(--card);color:var(--text);border:1.5px solid var(--line)}
.btn.sm{padding:8px 14px;font-size:13px}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* records list */
.rec{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 15px;
  margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:.12s;box-shadow:var(--shadow)}
.rec:active{transform:scale(.99)}
.rec .ico{width:42px;height:42px;border-radius:10px;background:var(--accent-soft);display:grid;
  place-items:center;font-size:19px;flex:0 0 auto}
.rec .meta{flex:1;min-width:0}
.rec .meta .t{font-weight:600;font-size:14.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rec .meta .s{font-size:12px;color:var(--sub);margin-top:1px}
.rec .pillscore{font-weight:700;font-size:15px;text-align:right}
.rec .pillscore .p{font-size:11px;font-weight:500;color:var(--sub)}
.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filters .inp{flex:1;min-width:120px;padding:9px 11px}
.empty{text-align:center;color:var(--sub);padding:50px 20px}
.empty .em{font-size:40px;margin-bottom:8px}

/* summary */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
@media(max-width:560px){.kpis{grid-template-columns:1fr 1fr}}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:14px;box-shadow:var(--shadow)}
.kpi .v{font-size:26px;font-weight:700;line-height:1.1}
.kpi .l{font-size:12px;color:var(--sub);margin-top:3px}
.bar-row{display:flex;align-items:center;gap:10px;margin:9px 0}
.bar-row .bl{flex:0 0 auto;width:120px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:22px;background:var(--bg);border-radius:7px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:7px;transition:width .5s ease}
.bar-row .bv{flex:0 0 auto;width:52px;text-align:right;font-size:13px;font-weight:600}
.lowlist .li{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:14px}
.lowlist .li:last-child{border:none}
.lowlist .li .x{font-weight:600}

/* modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:flex-end;justify-content:center}
.ov.show{display:flex;animation:fade .2s}
.sheet{background:var(--card);width:100%;max-width:600px;max-height:90vh;overflow:auto;
  border-radius:18px 18px 0 0;padding:20px;animation:up .28s cubic-bezier(.2,.9,.3,1)}
@media(min-width:600px){.ov{align-items:center}.sheet{border-radius:18px}}
@keyframes up{from{transform:translateY(40px);opacity:.6}to{transform:none;opacity:1}}
.sheet h2{font-size:18px;margin-bottom:4px}
.detimg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.detimg img{width:100%;border-radius:10px;border:1px solid var(--line)}
.detimg .cap{font-size:11px;color:var(--sub);text-align:center;margin-top:3px}
.dtbl{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
.dtbl td{padding:6px 4px;border-bottom:1px solid var(--line)}
.dtbl td:last-child{text-align:right;font-weight:600;width:44px}
.sheet-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}

/* toast */
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-80px);
  background:var(--text);color:var(--bg);padding:11px 20px;border-radius:50px;font-weight:500;font-size:14px;
  z-index:200;opacity:0;transition:.3s;box-shadow:var(--shadow-lg)}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.note{font-size:12px;color:var(--sub);text-align:center;margin-top:20px;line-height:1.6}

@media print{.topbar,.tabs,.totbar,.sheet-actions,.iconbtn{display:none!important}
  body{background:#fff;padding:0}.card{box-shadow:none;border:1px solid #ccc}}
</style>
</head>
<body>

<div class="topbar">
  <div class="wrap row">
    <div class="brand"><span class="dot">🍲</span> Food Testing Record</div>
    <button class="iconbtn" id="langBtn" title="ภาษา">TH</button>
    <button class="iconbtn" id="themeBtn" title="ธีม">🌙</button>
  </div>
  <div class="wrap">
    <div class="tabs" id="tabs">
      <button class="tab active" data-v="new">➕ บันทึกใหม่</button>
      <button class="tab" data-v="list">📋 ประวัติ</button>
      <button class="tab" data-v="sum">📊 สรุปเดือน</button>
    </div>
  </div>
</div>

<div class="wrap">

  <!-- ========== NEW ========== -->
  <section class="view active" id="v-new">
    <div class="card">
      <h3><span class="pip"></span>ข้อมูลการทดสอบ</h3>
      <div class="grid2">
        <div><label class="fl">รายการ / เมนู *</label><input class="inp" id="f_menu" placeholder="เช่น แกงจืดเงาะยัดไส้หมูสับ"></div>
        <div><label class="fl">สถานที่ / สาขา *</label><input class="inp" id="f_branch" placeholder="เช่น EMQ" list="branchList"><datalist id="branchList"></datalist></div>
        <div><label class="fl">ผู้เข้าทดสอบ</label><input class="inp" id="f_tester" placeholder="ชื่อผู้เข้าทดสอบ"></div>
        <div><label class="fl">วันที่</label><input class="inp" type="date" id="f_date"></div>
        <div><label class="fl">ผู้ประเมิน</label><input class="inp" id="f_eval" placeholder="ชื่อผู้ประเมิน"></div>
        <div><label class="fl">ตำแหน่ง</label><input class="inp" id="f_pos" placeholder="เช่น AREA Chef"></div>
        <div><label class="fl">Approved by</label><input class="inp" id="f_appr" placeholder="ผู้อนุมัติ"></div>
      </div>
    </div>

    <div class="card">
      <h3><span class="pip"></span>ภาพอาหาร</h3>
      <div class="photos">
        <div class="ph" id="ph_t"><div class="plh">📷<br>ภาพต้นแบบ</div><button class="clr" data-ph="t">✕</button></div>
        <div class="ph" id="ph_a"><div class="plh">📷<br>ภาพจริง</div><button class="clr" data-ph="a">✕</button></div>
      </div>
      <input type="file" id="file_t" accept="image/*" hidden>
      <input type="file" id="file_a" accept="image/*" hidden>
    </div>

    <div class="card">
      <h3><span class="pip"></span>เกณฑ์การให้คะแนน <span style="font-weight:400;color:var(--sub);font-size:12px">(แตะเลือก 5–0)</span></h3>
      <div id="critWrap"></div>
    </div>

    <div class="card">
      <h3><span class="pip"></span>Comments</h3>
      <textarea class="inp" id="f_comment" placeholder="หมายเหตุ / ความเห็นโดยรวม"></textarea>
    </div>

    <div class="totbar">
      <div style="flex:1">
        <span class="big" id="totVal">0</span><span style="font-size:16px;color:var(--sub)"> / 80</span>
        <span class="badge" id="totBadge" style="margin-left:8px">—</span>
        <div class="pct" id="totPct">0%</div>
      </div>
      <button class="btn ghost sm" id="resetBtn">ล้าง</button>
      <button class="btn" id="saveBtn">บันทึก</button>
    </div>
  </section>

  <!-- ========== LIST ========== -->
  <section class="view" id="v-list">
    <div class="filters">
      <select class="inp" id="flt_month"></select>
      <select class="inp" id="flt_branch"></select>
      <input class="inp" id="flt_search" placeholder="ค้นหาเมนู/ผู้ทดสอบ">
    </div>
    <div id="recList"></div>
  </section>

  <!-- ========== SUMMARY ========== -->
  <section class="view" id="v-sum">
    <div class="filters">
      <select class="inp" id="sum_month"></select>
      <button class="btn ghost sm" id="csvBtn">⬇ CSV</button>
    </div>
    <div id="sumBody"></div>
  </section>

  <div class="note">
    💾 ข้อมูลถูกเก็บไว้ในเครื่องนี้ (เบราว์เซอร์) ใช้งานได้ทันทีโดยไม่ต้องมีเซิร์ฟเวอร์<br>
    <button class="btn ghost sm" id="backupBtn" style="margin-top:8px">📦 Backup ข้อมูล</button>
    <button class="btn ghost sm" id="restoreBtn" style="margin-top:8px">♻️ Restore</button>
    <input type="file" id="restoreFile" accept="application/json" hidden>
  </div>
</div>

<!-- detail sheet -->
<div class="ov" id="ov"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ---------- storage abstraction (artifact window.storage OR localStorage fallback) ---------- */
const Store=(()=>{ 
  const w=(typeof window!=='undefined'&&window.storage&&typeof window.storage.get==='function');
  return {
    async get(k){try{if(w){const r=await window.storage.get(k);return r?JSON.parse(r.value):null;}
      const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}},
    async set(k,v){const s=JSON.stringify(v);try{if(w){await window.storage.set(k,s);}else{localStorage.setItem(k,s);}}catch(e){toast('บันทึกไม่สำเร็จ: พื้นที่อาจเต็ม');}},
    async del(k){try{if(w){await window.storage.delete(k);}else{localStorage.removeItem(k);}}catch(e){}}
  };
})();
const K_REC='ftr_records', K_IMG=id=>'ftr_img_'+id;

/* ---------- criteria config ---------- */
const GROUPS=[
 {label:'รสชาติและคุณภาพ',items:[
   ['overall','ภาพรวม','ลักษณะอาหารถูกต้องตามมาตรฐาน'],
   ['texture','เนื้อสัมผัส','วัตถุดิบปรุงสุกตามมาตรฐาน ไม่ดิบ/สุกจนเกินไป'],
   ['flavor','รสชาติ','มีรสชาติที่ถูกต้อง'],
   ['serving','การจัดเสิร์ฟ','ใช้ภาชนะและอุณหภูมิการจัดเสิร์ฟถูกต้อง']]},
 {label:'ความรู้ในสูตรอาหาร',items:[
   ['ingredients','ส่วนประกอบ','ใส่ส่วนประกอบได้ครบถ้วน'],
   ['trim','การตัดแต่ง','มีการตัดแต่งวัตถุดิบถูกต้องตามมาตรฐาน'],
   ['measure','การชั่งตวง','มีการใช้อุปกรณ์ในการตัก/เตรียมส่วนผสม'],
   ['time','เวลา','มีการใช้เวลาที่ชัดเจนหรือใช้นาฬิกา'],
   ['temp','อุณหภูมิ','ใช้อุณหภูมิที่ถูกต้องเหมาะสม ทราบว่าอาหารสุกที่อุณหภูมิเท่าไหร่'],
   ['recipe_show','สูตรอาหาร','มีสูตรอาหารแสดงเมื่อเรียกหา'],
   ['taste_test','การชิมอาหาร','ใช้อุปกรณ์ชิมอาหารถูกต้องตามมาตรฐาน และชิมอาหารที่สมควรทุกจาน'],
   ['equipment','อุปกรณ์','ใช้อุปกรณ์ถูกต้อง เหมาะสมตามมาตรฐาน']]},
 {label:'พนักงาน',items:[
   ['uniform','การแต่งกาย','เครื่องแบบถูกต้องตามตำแหน่ง'],
   ['hygiene','สุขอนามัย','เล็บ ผม หนวดเครา'],
   ['multi','ความสามารถอื่น','สามารถปฏิบัติงานนอกเหนือจากแผนกได้'],
   ['language','ภาษา','สามารถบอกชื่ออาหาร/ส่วนผสมเป็นภาษาอังกฤษได้']]}
];
const ALL_ITEMS=GROUPS.flatMap(g=>g.items);
const MAX=ALL_ITEMS.length*5; // 80
const LABEL=Object.fromEntries(ALL_ITEMS.map(i=>[i[0],i[1]]));

/* ---------- state ---------- */
let records=[];          // index (no images)
let editingId=null;
let pendingImg={t:null,a:null}; // dataURLs for current form

/* ---------- helpers ---------- */
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
const todayISO=()=>new Date().toISOString().slice(0,10);
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function pct(v){return Math.round(v/MAX*100);}
function colorFor(p){return p>=90?'var(--green)':p>=80?'var(--amber)':'var(--red)';}
function fmtThaiDate(iso){if(!iso)return'';const d=new Date(iso+'T00:00:00');const m=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];return d.getDate()+' '+m[d.getMonth()]+' '+(d.getFullYear()+543);}
function monthKey(iso){return iso?iso.slice(0,7):'';}
function monthLabel(ym){if(!ym)return'';const[y,m]=ym.split('-');const M=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];return M[+m-1]+' '+(+y+543);}

/* ---------- build form ---------- */
function buildForm(){
  let h='';
  GROUPS.forEach(g=>{
    h+=`<div class="grp-title">${g.label}</div>`;
    g.items.forEach(([k,nm,ds])=>{
      h+=`<div class="crit" data-k="${k}"><div class="nm">${nm}</div><div class="ds">${ds}</div><div class="score">`;
      [5,4,3,2,1,0].forEach(s=>h+=`<button class="sc" data-s="${s}">${s}</button>`);
      h+=`</div></div>`;
    });
  });
  $('#critWrap').innerHTML=h;
  // default all = 5
  $$('#critWrap .crit').forEach(c=>setScore(c,5));
  $$('#critWrap .sc').forEach(b=>b.onclick=()=>{setScore(b.closest('.crit'),+b.dataset.s);calcTotal();});
  calcTotal();
}
function setScore(crit,s){
  crit.dataset.val=s;
  crit.querySelectorAll('.sc').forEach(b=>{
    b.classList.toggle('on',+b.dataset.s===s);
    b.classList.remove('lo','mid');
    if(+b.dataset.s===s){if(s<=2)b.classList.add('lo');else if(s<=3)b.classList.add('mid');}
  });
}
function getScores(){const o={};$$('#critWrap .crit').forEach(c=>o[c.dataset.k]=+c.dataset.val);return o;}
function calcTotal(){
  const sc=getScores();const tot=Object.values(sc).reduce((a,b)=>a+b,0);const p=pct(tot);
  $('#totVal').textContent=tot;$('#totPct').textContent=p+'%';
  const b=$('#totBadge');b.style.background=colorFor(p);
  b.textContent=p>=90?'ดีเยี่ยม':p>=80?'ผ่านเกณฑ์':'ต้องปรับปรุง';
}

/* ---------- photo upload (downscaled) ---------- */
function pickPhoto(which){ $(which==='t'?'#file_t':'#file_a').click(); }
function downscale(file,cb){
  const r=new FileReader();
  r.onload=()=>{const img=new Image();img.onload=()=>{
    const max=900;let{width:w,height:h}=img;if(w>h&&w>max){h=h*max/w;w=max;}else if(h>max){w=w*max/h;h=max;}
    const c=document.createElement('canvas');c.width=w;c.height=h;
    c.getContext('2d').drawImage(img,0,0,w,h);cb(c.toDataURL('image/jpeg',0.72));
  };img.src=r.result;};
  r.readAsDataURL(file);
}
function setPhoto(which,dataURL){
  pendingImg[which]=dataURL;
  const el=$(which==='t'?'#ph_t':'#ph_a');
  el.classList.toggle('has',!!dataURL);
  el.querySelector('.plh')?.remove();el.querySelector('img')?.remove();
  if(dataURL){const im=document.createElement('img');im.src=dataURL;el.insertBefore(im,el.firstChild);}
  else{const d=document.createElement('div');d.className='plh';d.innerHTML=which==='t'?'📷<br>ภาพต้นแบบ':'📷<br>ภาพจริง';el.insertBefore(d,el.firstChild);}
}

/* ---------- save / reset ---------- */
async function saveRecord(){
  const menu=$('#f_menu').value.trim(), branch=$('#f_branch').value.trim();
  if(!menu||!branch){toast('กรุณากรอก เมนู และ สาขา');return;}
  const sc=getScores();const tot=Object.values(sc).reduce((a,b)=>a+b,0);
  const id=editingId||uid();
  const rec={id,date:$('#f_date').value||todayISO(),menu,branch,
    tester:$('#f_tester').value.trim(),eval:$('#f_eval').value.trim(),pos:$('#f_pos').value.trim(),
    appr:$('#f_appr').value.trim(),scores:sc,total:tot,pct:pct(tot),
    comment:$('#f_comment').value.trim(),hasImg:!!(pendingImg.t||pendingImg.a),
    createdAt:editingId?(records.find(r=>r.id===id)?.createdAt||Date.now()):Date.now()};
  records=records.filter(r=>r.id!==id);records.push(rec);
  records.sort((a,b)=>(b.date+b.createdAt).localeCompare(a.date+a.createdAt));
  await Store.set(K_REC,records);
  if(rec.hasImg) await Store.set(K_IMG(id),{t:pendingImg.t,a:pendingImg.a});
  else await Store.del(K_IMG(id));
  toast(editingId?'แก้ไขแล้ว ✓':'บันทึกแล้ว ✓');
  resetForm();refreshAll();switchView('list');
}
function resetForm(){
  editingId=null;pendingImg={t:null,a:null};
  ['f_menu','f_branch','f_tester','f_eval','f_pos','f_appr','f_comment'].forEach(i=>$('#'+i).value='');
  $('#f_date').value=todayISO();
  $$('#critWrap .crit').forEach(c=>setScore(c,5));calcTotal();
  setPhoto('t',null);setPhoto('a',null);
  $('#saveBtn').textContent='บันทึก';
}

/* ---------- edit ---------- */
async function editRecord(id){
  const r=records.find(x=>x.id===id);if(!r)return;
  editingId=id;
  $('#f_menu').value=r.menu;$('#f_branch').value=r.branch;$('#f_tester').value=r.tester||'';
  $('#f_date').value=r.date;$('#f_eval').value=r.eval||'';$('#f_pos').value=r.pos||'';
  $('#f_appr').value=r.appr||'';$('#f_comment').value=r.comment||'';
  $$('#critWrap .crit').forEach(c=>setScore(c,r.scores[c.dataset.k]??5));calcTotal();
  setPhoto('t',null);setPhoto('a',null);
  if(r.hasImg){const im=await Store.get(K_IMG(id));if(im){setPhoto('t',im.t);setPhoto('a',im.a);}}
  $('#saveBtn').textContent='อัปเดต';
  closeSheet();switchView('new');window.scrollTo({top:0,behavior:'smooth'});
}
async function delRecord(id){
  if(!confirm('ลบรายการนี้?'))return;
  records=records.filter(r=>r.id!==id);await Store.set(K_REC,records);await Store.del(K_IMG(id));
  toast('ลบแล้ว');closeSheet();refreshAll();
}

/* ---------- list ---------- */
function uniqueBranches(){return[...new Set(records.map(r=>r.branch))].sort();}
function uniqueMonths(){return[...new Set(records.map(r=>monthKey(r.date)))].sort().reverse();}
function fillSelectors(){
  const months=uniqueMonths(),branches=uniqueBranches();
  const fm=$('#flt_month'),fb=$('#flt_branch'),sm=$('#sum_month'),dl=$('#branchList');
  fm.innerHTML='<option value="">ทุกเดือน</option>'+months.map(m=>`<option value="${m}">${monthLabel(m)}</option>`).join('');
  fb.innerHTML='<option value="">ทุกสาขา</option>'+branches.map(b=>`<option>${b}</option>`).join('');
  sm.innerHTML=months.length?months.map(m=>`<option value="${m}">${monthLabel(m)}</option>`).join(''):`<option value="${monthKey(todayISO())}">${monthLabel(monthKey(todayISO()))}</option>`;
  dl.innerHTML=branches.map(b=>`<option>${b}</option>`).join('');
}
function renderList(){
  const m=$('#flt_month').value,b=$('#flt_branch').value,q=$('#flt_search').value.trim().toLowerCase();
  let rows=records.filter(r=>(!m||monthKey(r.date)===m)&&(!b||r.branch===b)&&
    (!q||(r.menu+r.tester+r.eval).toLowerCase().includes(q)));
  const el=$('#recList');
  if(!rows.length){el.innerHTML=`<div class="empty"><div class="em">📋</div>ยังไม่มีรายการ${records.length?'ตามตัวกรอง':''}</div>`;return;}
  el.innerHTML=rows.map(r=>`<div class="rec" data-id="${r.id}">
    <div class="ico">🍽️</div>
    <div class="meta"><div class="t">${esc(r.menu)}</div>
      <div class="s">${esc(r.branch)} · ${fmtThaiDate(r.date)}${r.tester?' · '+esc(r.tester):''}</div></div>
    <div class="pillscore" style="color:${colorFor(r.pct)}">${r.total}/80<div class="p">${r.pct}%</div></div>
  </div>`).join('');
  $$('#recList .rec').forEach(c=>c.onclick=()=>openDetail(c.dataset.id));
}
function esc(s){return(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

/* ---------- detail sheet ---------- */
async function openDetail(id){
  const r=records.find(x=>x.id===id);if(!r)return;
  let img='';
  if(r.hasImg){const im=await Store.get(K_IMG(id));if(im){img=`<div class="detimg">
    ${im.t?`<div><img src="${im.t}"><div class="cap">ต้นแบบ</div></div>`:''}
    ${im.a?`<div><img src="${im.a}"><div class="cap">จริง</div></div>`:''}</div>`;}}
  let rowsH='';GROUPS.forEach(g=>{rowsH+=`<tr><td colspan="2" style="font-weight:600;color:var(--accent);padding-top:10px">${g.label}</td></tr>`;
    g.items.forEach(([k,nm])=>{const v=r.scores[k];rowsH+=`<tr><td>${nm}</td><td style="color:${v<=2?'var(--red)':v<=3?'var(--amber)':'var(--text)'}">${v}</td></tr>`;});});
  $('#sheet').innerHTML=`
    <h2>${esc(r.menu)}</h2>
    <div style="color:var(--sub);font-size:13px">${esc(r.branch)} · ${fmtThaiDate(r.date)}</div>
    <div style="display:flex;align-items:center;gap:10px;margin:14px 0">
      <span style="font-size:30px;font-weight:700;color:${colorFor(r.pct)}">${r.total}<span style="font-size:16px;color:var(--sub)">/80</span></span>
      <span class="badge" style="background:${colorFor(r.pct)}">${r.pct}%</span>
    </div>
    ${img}
    <table class="dtbl">
      ${r.tester?`<tr><td>ผู้เข้าทดสอบ</td><td style="font-weight:400;width:auto;text-align:right">${esc(r.tester)}</td></tr>`:''}
      ${r.eval?`<tr><td>ผู้ประเมิน</td><td style="font-weight:400;width:auto;text-align:right">${esc(r.eval)}${r.pos?' ('+esc(r.pos)+')':''}</td></tr>`:''}
      ${r.appr?`<tr><td>Approved by</td><td style="font-weight:400;width:auto;text-align:right">${esc(r.appr)}</td></tr>`:''}
      ${rowsH}
    </table>
    ${r.comment?`<div style="margin-top:12px;font-size:13px"><b>Comments:</b> ${esc(r.comment)}</div>`:''}
    <div class="sheet-actions">
      <button class="btn ghost sm" onclick="window.print()">🖨 พิมพ์</button>
      <button class="btn ghost sm" data-edit="${id}">✏️ แก้ไข</button>
      <button class="btn ghost sm" data-del="${id}" style="color:var(--red)">🗑 ลบ</button>
      <button class="btn sm" data-close style="margin-left:auto">ปิด</button>
    </div>`;
  $('#sheet').querySelector('[data-edit]').onclick=()=>editRecord(id);
  $('#sheet').querySelector('[data-del]').onclick=()=>delRecord(id);
  $('#sheet').querySelector('[data-close]').onclick=closeSheet;
  $('#ov').classList.add('show');
}
function closeSheet(){$('#ov').classList.remove('show');}
$('#ov').onclick=e=>{if(e.target===$('#ov'))closeSheet();};

/* ---------- summary ---------- */
function renderSummary(){
  const m=$('#sum_month').value;const rows=records.filter(r=>monthKey(r.date)===m);
  const el=$('#sumBody');
  if(!rows.length){el.innerHTML=`<div class="empty"><div class="em">📊</div>ยังไม่มีข้อมูลในเดือนนี้</div>`;return;}
  const n=rows.length;
  const avgPct=Math.round(rows.reduce((a,r)=>a+r.pct,0)/n);
  const passed=rows.filter(r=>r.pct>=80).length;
  const branches=[...new Set(rows.map(r=>r.branch))];

  // by branch
  const byBranch=branches.map(b=>{const rr=rows.filter(r=>r.branch===b);
    return{b,avg:Math.round(rr.reduce((a,r)=>a+r.pct,0)/rr.length),n:rr.length};}).sort((a,b)=>b.avg-a.avg);
  // by group
  const byGroup=GROUPS.map(g=>{let s=0,mx=0;rows.forEach(r=>g.items.forEach(([k])=>{s+=r.scores[k]??0;mx+=5;}));
    return{label:g.label,avg:Math.round(s/mx*100)};});
  // lowest criteria
  const critAvg=ALL_ITEMS.map(([k,nm])=>{const s=rows.reduce((a,r)=>a+(r.scores[k]??0),0);
    return{nm,avg:+(s/n).toFixed(2),pct:Math.round(s/n/5*100)};}).sort((a,b)=>a.avg-b.avg);

  const barRow=(label,p,extra='')=>`<div class="bar-row"><div class="bl" title="${label}">${label}</div>
    <div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${colorFor(p)}"></div></div>
    <div class="bv">${p}%${extra}</div></div>`;

  el.innerHTML=`
   <div class="kpis">
     <div class="kpi"><div class="v">${n}</div><div class="l">การทดสอบ</div></div>
     <div class="kpi"><div class="v" style="color:${colorFor(avgPct)}">${avgPct}%</div><div class="l">คะแนนเฉลี่ย</div></div>
     <div class="kpi"><div class="v">${passed}/${n}</div><div class="l">ผ่าน ≥80%</div></div>
     <div class="kpi"><div class="v">${branches.length}</div><div class="l">สาขา</div></div>
   </div>
   <div class="card"><h3><span class="pip"></span>คะแนนเฉลี่ยรายสาขา</h3>
     ${byBranch.map(x=>barRow(x.b,x.avg,` <span style="color:var(--sub);font-weight:400">·${x.n}</span>`)).join('')}</div>
   <div class="card"><h3><span class="pip"></span>คะแนนเฉลี่ยรายหมวด</h3>
     ${byGroup.map(x=>barRow(x.label,x.avg)).join('')}</div>
   <div class="card"><h3><span class="pip"></span>🔻 หัวข้อที่ได้คะแนนต่ำสุด (ควรปรับปรุง)</h3>
     <div class="lowlist">${critAvg.slice(0,5).map(c=>`<div class="li"><span>${c.nm}</span><span class="x" style="color:${colorFor(c.pct)}">${c.avg} <span style="color:var(--sub);font-weight:400">(${c.pct}%)</span></span></div>`).join('')}</div></div>
   <div class="card"><h3><span class="pip"></span>เมนูที่ทดสอบ (${n})</h3>
     <div class="lowlist">${rows.map(r=>`<div class="li"><span>${esc(r.menu)} <span style="color:var(--sub);font-size:12px">· ${esc(r.branch)}</span></span><span class="x" style="color:${colorFor(r.pct)}">${r.pct}%</span></div>`).join('')}</div></div>`;
}

/* ---------- CSV export ---------- */
function exportCSV(){
  const m=$('#sum_month').value;const rows=records.filter(r=>monthKey(r.date)===m);
  if(!rows.length){toast('ไม่มีข้อมูลให้ส่งออก');return;}
  const head=['วันที่','สาขา','เมนู','ผู้เข้าทดสอบ','ผู้ประเมิน',...ALL_ITEMS.map(i=>i[1]),'รวม','เปอร์เซ็นต์','Comments'];
  const lines=[head];
  rows.forEach(r=>lines.push([r.date,r.branch,r.menu,r.tester||'',r.eval||'',
    ...ALL_ITEMS.map(i=>r.scores[i[0]]??''),r.total,r.pct+'%',(r.comment||'').replace(/\n/g,' ')]));
  const csv='\uFEFF'+lines.map(l=>l.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  dl('FoodTesting_'+m+'.csv','data:text/csv;charset=utf-8,'+encodeURIComponent(csv));
}
function dl(name,href){const a=document.createElement('a');a.href=href;a.download=name;a.click();}

/* ---------- backup / restore ---------- */
async function backup(){
  const imgs={};for(const r of records){if(r.hasImg){const im=await Store.get(K_IMG(r.id));if(im)imgs[r.id]=im;}}
  const blob=new Blob([JSON.stringify({records,imgs,v:1,exportedAt:new Date().toISOString()},null,0)],{type:'application/json'});
  dl('FoodTesting_backup_'+todayISO()+'.json',URL.createObjectURL(blob));
  toast('สำรองข้อมูลแล้ว');
}
function restore(file){
  const r=new FileReader();r.onload=async()=>{try{
    const d=JSON.parse(r.result);if(!Array.isArray(d.records))throw 0;
    if(!confirm('นำเข้าจะเขียนทับข้อมูลปัจจุบันทั้งหมด ดำเนินการต่อ?'))return;
    records=d.records;await Store.set(K_REC,records);
    for(const id in(d.imgs||{}))await Store.set(K_IMG(id),d.imgs[id]);
    toast('นำเข้าข้อมูลแล้ว ✓');refreshAll();
  }catch(e){toast('ไฟล์ไม่ถูกต้อง');}};r.readAsText(file);
}

/* ---------- view switching ---------- */
function switchView(v){
  $$('.tab').forEach(t=>t.classList.toggle('active',t.dataset.v===v));
  $$('.view').forEach(s=>s.classList.toggle('active',s.id==='v-'+v));
  if(v==='list')renderList();if(v==='sum')renderSummary();
  window.scrollTo({top:0,behavior:'instant'});
}
function refreshAll(){fillSelectors();renderList();renderSummary();}

/* ---------- init ---------- */
async function init(){
  buildForm();$('#f_date').value=todayISO();
  records=(await Store.get(K_REC))||[];
  fillSelectors();
  // theme
  const savedT=(await Store.get('ftr_theme'))||'light';document.documentElement.dataset.t=savedT;
  $('#themeBtn').textContent=savedT==='dark'?'☀️':'🌙';
  // events
  $$('.tab').forEach(t=>t.onclick=()=>switchView(t.dataset.v));
  $('#saveBtn').onclick=saveRecord;$('#resetBtn').onclick=()=>{resetForm();toast('ล้างฟอร์มแล้ว');};
  $('#ph_t').onclick=e=>{if(!e.target.classList.contains('clr'))pickPhoto('t');};
  $('#ph_a').onclick=e=>{if(!e.target.classList.contains('clr'))pickPhoto('a');};
  $$('.clr').forEach(b=>b.onclick=e=>{e.stopPropagation();setPhoto(b.dataset.ph,null);});
  $('#file_t').onchange=e=>{if(e.target.files[0])downscale(e.target.files[0],u=>setPhoto('t',u));e.target.value='';};
  $('#file_a').onchange=e=>{if(e.target.files[0])downscale(e.target.files[0],u=>setPhoto('a',u));e.target.value='';};
  ['flt_month','flt_branch'].forEach(i=>$('#'+i).onchange=renderList);
  $('#flt_search').oninput=renderList;
  $('#sum_month').onchange=renderSummary;
  $('#csvBtn').onclick=exportCSV;
  $('#backupBtn').onclick=backup;
  $('#restoreBtn').onclick=()=>$('#restoreFile').click();
  $('#restoreFile').onchange=e=>{if(e.target.files[0])restore(e.target.files[0]);e.target.value='';};
  $('#themeBtn').onclick=async()=>{const n=document.documentElement.dataset.t==='dark'?'light':'dark';
    document.documentElement.dataset.t=n;$('#themeBtn').textContent=n==='dark'?'☀️':'🌙';await Store.set('ftr_theme',n);};
  $('#langBtn').onclick=()=>toast('เวอร์ชันนี้ใช้ภาษาไทยเป็นหลัก');
}
init();
</script>
